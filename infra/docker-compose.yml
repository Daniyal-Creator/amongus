services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amongus_coder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amongus_coder"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://postgres:postgres@db:5432/amongus_coder
      CORS_ORIGIN: "*"
      # Ollama Cloud (gratis) — set OLLAMA_API_KEY di shell sebelum `docker compose up`.
      # Fallback ke Ollama lokal di host machine kalau OLLAMA_BASE_URL tidak di-override.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-coder:480b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      # Piston public sandbox
      PISTON_BASE_URL: https://emkc.org/api/v2/piston
      # Rate limits
      AI_RATE_LIMIT_PER_MINUTE: "5"
      CHAT_RATE_LIMIT_PER_10S: "10"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres-data:
